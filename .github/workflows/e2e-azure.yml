name: e2e-azure

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'koreacentral' }}
  REPO_SHORT: scaffold
  # Azure Functions Core Tools version (installed via npm in the install step below).
  # Pin exactly; bump only after a verified end-to-end run on a tag or workflow_dispatch.
  FUNCTIONS_CORE_TOOLS_VERSION: "4.12.0"

jobs:
  deploy_and_test:
    name: Generate, Deploy & Test
    runs-on: ubuntu-latest
    outputs:
      resource_group: ${{ steps.names.outputs.rg }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Compute resource names
        id: names
        run: |
          RUN="${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}"
          RG="rg-af-e2e-${REPO_SHORT}-${RUN}"
          APP="af-e2e-${REPO_SHORT}-${RUN}"
          ST="stafe2e${RUN}"
          ST="${ST:0:24}"
          echo "rg=${RG}"   >> "$GITHUB_OUTPUT"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"
          echo "st=${ST}"   >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"

      - name: Install scaffold from source
        run: pip install -e ".[dev]" && pip install requests pytest pytest-html

      - name: Generate project with scaffold CLI
        run: |
          SCAFFOLDED=/tmp/e2e-scaffolded
          azure-functions-scaffold new "e2e-http-app" \
            --destination "$SCAFFOLDED" \
            --no-git \
            --no-github-actions
          echo "E2E_SCAFFOLDED_DIR=$SCAFFOLDED/e2e-http-app" >> "$GITHUB_ENV"

      - name: Run scaffold structure tests (no Azure)
        run: pytest tests/e2e -v -k "scaffolded" --no-cov
        env:
          E2E_SCAFFOLDED_DIR: ${{ env.E2E_SCAFFOLDED_DIR }}

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name "${{ steps.names.outputs.rg }}" \
            --location "$AZURE_LOCATION" \
            --tags purpose=e2e repo=azure-functions-scaffold-python run="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Deploy infra (Bicep)
        run: |
          az deployment group create \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --template-file infra/main.bicep \
            --parameters \
                location="$AZURE_LOCATION" \
                functionAppName="${{ steps.names.outputs.app }}" \
                storageName="${{ steps.names.outputs.st }}" \
                enableAppInsights=false

      # Install Azure Functions Core Tools via npm.
      # We previously installed from packages.microsoft.com via apt, but that feed
      # has hit stale-index 404s during Core Tools 4.x package transitions
      # (Azure/azure-functions-core-tools#4796) and there is no Microsoft-maintained
      # GitHub Action for Core Tools. npm is Microsoft's documented v4 install path
      # (see Azure/azure-functions-core-tools README) and is the same approach used
      # in Microsoft's own CI (e.g. microsoft/agent-framework,
      # Azure/azure-functions-durable-extension). Version is pinned via the
      # FUNCTIONS_CORE_TOOLS_VERSION env var declared at the workflow level.
      # Node is pinned explicitly so the install path stays reproducible across
      # GitHub-hosted runner image updates (the npm package requires Node >= 20).
      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Azure Functions Core Tools
        run: |
          npm install -g "azure-functions-core-tools@${FUNCTIONS_CORE_TOOLS_VERSION}"
          FUNC_VERSION="$(func --version)"
          echo "Installed func: ${FUNC_VERSION}"
          test "${FUNC_VERSION}" = "${FUNCTIONS_CORE_TOOLS_VERSION}"

      - name: Publish scaffolded app
        run: |
          cd "$E2E_SCAFFOLDED_DIR"
          # func publish requires requirements.txt — export from pyproject.toml
          pip install pip-tools --quiet
          pip-compile pyproject.toml --output-file requirements.txt --no-header --no-annotate --quiet
          func azure functionapp publish "${{ steps.names.outputs.app }}" --python --build remote

      - name: Wait for app to start and diagnose
        run: |
          APP_URL="https://${{ steps.names.outputs.app }}.azurewebsites.net"
          echo "Waiting 60s for app startup..."
          sleep 60
          echo "Probing app status:"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/hello?name=probe" || echo "curl-failed")
            echo "  attempt $i: ${APP_URL}/api/hello -> ${STATUS}"
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
      - name: Run e2e HTTP tests
        run: pytest tests/e2e -v -k "not scaffolded" --no-cov --html=e2e-report/report.html --self-contained-html
        env:
          E2E_BASE_URL: https://${{ steps.names.outputs.app }}.azurewebsites.net

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e-report/
          retention-days: 30

  cleanup:
    name: Cleanup Azure Resources
    runs-on: ubuntu-latest
    needs: [deploy_and_test]
    if: always()
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Resource Group
        run: |
          RG="${{ needs.deploy_and_test.outputs.resource_group }}"
          if [ -n "$RG" ]; then
            echo "Deleting resource group: $RG"
            az group delete --name "$RG" --yes --no-wait || true
          else
            echo "No resource group to delete."
          fi
