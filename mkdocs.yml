site_name: Azure Functions Scaffold
site_description: Scaffolding CLI for Azure Functions Python v2 projects
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-functions-scaffold
site_url: https://yeongseon.github.io/azure-functions-scaffold/
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Introduction: guide/index.md
      - Getting Started: guide/getting-started.md
      - Configuration: guide/configuration.md
  - User Guide:
      - Tutorials: guide/tutorial.md
      - Project Structure: guide/project-structure.md
      - Templates: guide/templates.md
      - Features & Presets: guide/features.md
      - Expanding Your Project: guide/expanding.md
      - Deploying: guide/deploying.md
  - Examples:
      - Overview: examples/index.md
      - HTTP API: examples/http_api.md
      - Timer Job: examples/timer_job.md
      - Full Stack: examples/full_stack.md
  - API Reference: reference/api.md
  - Reference:
      - CLI Reference: reference/cli.md
      - Template Specification: reference/template-spec.md
      - Architecture: reference/architecture.md
  - Contributing:
      - Development: contributing/development.md
      - Testing: contributing/testing.md
      - Guidelines: contributing/guidelines.md
  - Troubleshooting: guide/troubleshooting.md
  - FAQ: faq.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_signature: true
            show_root_full_path: false
            merge_init_into_class: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-functions-scaffold
  copyright: |
    © 2026 Yeongseon Choe – MIT Licensed

extra_javascript:
  - https://unpkg.com/mermaid@11.14.0/dist/mermaid.min.js
