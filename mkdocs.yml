site_name: Azure Functions Scaffold
site_description: Scaffolding CLI for Azure Functions Python v2 projects
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-functions-scaffold
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Why This Structure: why.md
  - Installation: installation.md
  - CLI Reference: cli.md
  - Templates: template_spec.md
  - Architecture: architecture.md
  - Style Guide: style_guide.md
  - Development: development.md
  - Testing: testing.md
  - Troubleshooting: troubleshooting.md
  - Roadmap: roadmap.md
  - Security: security.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-functions-scaffold
  copyright: |
    © 2026 Yeongseon Choe – MIT Licensed
